[package]
name = "btt"
version = "0.1.0"
edition = "2021"
description = "Minimal, secure Bittensor CLI"
license = "MIT"

[dependencies]
subxt = { version = "0.38", features = ["substrate-compat"] }
tokio = { version = "1", features = ["full"] }
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
