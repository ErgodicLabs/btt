name: dep-audit

# Runs cargo-audit, cargo-deny, and cargo-outdated against the repo's
# dependency tree in parallel matrix jobs, runs the dep-checksum
# tripwire (issue #6) in a sibling job, then combines the four reports
# into a single structured summary posted as a PR comment.
#
# Per AGENTS.md principle 1 (dependency discipline), every dep is an
# attack surface until proven essential. This workflow surfaces the
# information; the human reviewer enforces the policy.
#
# Tool versions are pinned in scripts/dep-audit/tool-versions.txt so
# the cache key invalidates whenever we bump a tool, and the install
# step reads the same file so the binary in the cache matches the
# version we asked for.
#
# The checksum tripwire is its own job (not a matrix entry) because it
# needs neither the Rust toolchain nor the cargo cache — only python3
# and the committed DB at .cryptid/dep-audit/checksums.db. Keeping it
# separate runs it in parallel with the cargo matrix and avoids the
# toolchain setup cost.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Sundays at 04:00 UTC. Catches advisories that land between PRs.
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Verbose output (dump full cargo tree and raw tool output)'
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write

jobs:
  # Pre-check: issue #52. Exercise the render scripts against a fixture
  # before the audit matrix runs. A regression in render-ignores.sh or
  # render-deny-toml.sh would otherwise surface as a confusing
  # "advisory not ignored" failure inside the cargo-audit or
  # cargo-deny job — fail fast here with a clear signal instead.
  render-scripts-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run render-ignores.sh / render-deny-toml.sh unit tests
        run: |
          chmod +x scripts/dep-audit/test_render_ignores.sh
          chmod +x scripts/dep-audit/render-ignores.sh
          chmod +x scripts/dep-audit/render-deny-toml.sh
          bash scripts/dep-audit/test_render_ignores.sh

      - name: Validate rustsec-ignores.jsonl parses
        run: |
          python3 -c 'import json, sys
          with open("scripts/dep-audit/rustsec-ignores.jsonl") as f:
              for i, line in enumerate(f, 1):
                  e = json.loads(line)
                  assert "id" in e, f"line {i}: missing id"
                  assert e["id"].startswith("RUSTSEC-"), f"line {i}: bad id"
                  assert "reason" in e, f"line {i}: missing reason"
          print("rustsec-ignores.jsonl: ok")
          '

      - name: Validate rendered deny.toml parses
        run: |
          bash scripts/dep-audit/render-deny-toml.sh > /tmp/deny.toml
          python3 -c 'import tomllib; d = tomllib.load(open("/tmp/deny.toml","rb")); assert d["advisories"]["ignore"], "empty ignore list"; print("rendered deny.toml: ok,", len(d["advisories"]["ignore"]), "ignores")'

  audit:
    runs-on: ubuntu-latest
    needs: render-scripts-test
    strategy:
      fail-fast: false
      matrix:
        tool: [cargo-audit, cargo-deny, cargo-outdated]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        # Pinned to match rust-toolchain.toml. When bumping, update both.
        uses: dtolnay/rust-toolchain@1.94.1

      - name: Cache ${{ matrix.tool }} binary
        id: tool-cache
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/${{ matrix.tool }}
          key: cargo-${{ matrix.tool }}-${{ runner.os }}-${{ hashFiles('scripts/dep-audit/tool-versions.txt') }}

      - name: Install ${{ matrix.tool }}
        if: steps.tool-cache.outputs.cache-hit != 'true'
        run: |
          # Read the pinned version from tool-versions.txt. The file is
          # a simple "<tool> = <version>" list so the same source of
          # truth feeds the cache key hash and the install command.
          version="$(awk -v t='${{ matrix.tool }}' '$1 == t { print $3; exit }' scripts/dep-audit/tool-versions.txt)"
          if [ -z "${version}" ]; then
            echo "no pinned version for ${{ matrix.tool }} in scripts/dep-audit/tool-versions.txt" >&2
            exit 1
          fi
          echo "installing ${{ matrix.tool }}@${version}"
          cargo install --locked --version "${version}" '${{ matrix.tool }}'

      - name: Run ${{ matrix.tool }}
        id: run
        env:
          VERBOSE: ${{ inputs.verbose && '1' || '0' }}
        run: |
          chmod +x scripts/dep-audit/run-one.sh
          # Suspend bash -e around the script so we can capture the
          # exit status into the status file (which the combine job
          # re-reads) before propagating it out of the step. The
          # artifact upload step below is `if: always()` so the report
          # and status file still upload on tool failure, and the
          # combine job has `if: !cancelled()` so it still runs and
          # posts its verdict even when a matrix cell fails.
          #
          # Issue #65: the previous version ended with tool_exit=0 as
          # the last expression, so every matrix cell reported SUCCESS
          # regardless of tool result. Now the cell's status check
          # mirrors the tool's own exit — `audit (cargo-deny): fail`
          # when cargo-deny reported advisories, `pass` when it didn't.
          set +e
          scripts/dep-audit/run-one.sh '${{ matrix.tool }}' \
            > 'report-${{ matrix.tool }}.md' \
            2> 'stderr-${{ matrix.tool }}.log'
          tool_exit=$?
          set -e
          printf '%s\n' "${tool_exit}" > 'status-${{ matrix.tool }}.txt'
          echo '--- report ---'
          cat 'report-${{ matrix.tool }}.md'
          if [ "${VERBOSE}" = "1" ]; then
            echo '--- stderr ---'
            cat 'stderr-${{ matrix.tool }}.log'
          fi
          echo "tool_exit=${tool_exit}" >> "$GITHUB_OUTPUT"
          exit "${tool_exit}"

      - name: Upload ${{ matrix.tool }} artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dep-audit-${{ matrix.tool }}-${{ github.run_id }}
          path: |
            report-${{ matrix.tool }}.md
            stderr-${{ matrix.tool }}.log
            status-${{ matrix.tool }}.txt
          retention-days: 90

  checksum:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run dep-checksum tripwire
        id: run
        run: |
          # Issue #6: same-version-different-bytes tripwire. Compares
          # every dep in Cargo.lock against the committed DB at
          # .cryptid/dep-audit/checksums.db. Never passes --update in
          # CI; any new entry must already be in the committed DB.
          #
          # python3 is pre-installed on ubuntu-latest runners and the
          # script has no third-party imports, so no setup step is
          # required.
          set +e
          python3 scripts/dep-audit/checksum.py --report report-checksum.md \
            > stdout-checksum.log 2> stderr-checksum.log
          tool_exit=$?
          set -e
          printf '%s\n' "${tool_exit}" > 'status-checksum.txt'
          echo '--- checksum report ---'
          cat report-checksum.md || true
          if [ -s stderr-checksum.log ]; then
            echo '--- checksum stderr ---'
            cat stderr-checksum.log
          fi
          echo "tool_exit=${tool_exit}" >> "$GITHUB_OUTPUT"
          # Mirror the #65/#70 fix: propagate the tool exit so the per-cell
          # `checksum` status check accurately reflects whether the tripwire
          # fired. The upload step below is `if: always()` so the artifact
          # still reaches combine even when we exit non-zero here. The
          # combine job's `if: !cancelled()` predicate already tolerates
          # failed needs, so this change is strictly additive.
          exit "${tool_exit}"

      - name: Upload checksum artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dep-audit-checksum-${{ github.run_id }}
          path: |
            report-checksum.md
            stdout-checksum.log
            stderr-checksum.log
            status-checksum.txt
          retention-days: 90

  combine:
    runs-on: ubuntu-latest
    needs: [audit, checksum]
    # `!cancelled()` runs combine on both success and failure of the
    # matrix cells and checksum job, but NOT when the whole workflow is
    # cancelled mid-run. Issue #65: we need combine to run even when a
    # matrix cell fails (so reviewers still get the aggregated PR
    # comment) while still honoring cancellation.
    if: ${{ !cancelled() }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all matrix artifacts
        uses: actions/download-artifact@v4
        with:
          path: dep-audit-artifacts
          pattern: dep-audit-*-${{ github.run_id }}

      - name: Combine reports
        id: combine
        run: |
          set -uo pipefail
          artifacts_root='dep-audit-artifacts'
          combined='combined-report.md'
          sections='sections.md'
          : > "${sections}"

          overall_exit=0
          # Fixed order so the combined report is deterministic regardless
          # of matrix scheduling. checksum comes last so the supply-chain
          # tripwire is the final section a reviewer expands.
          for tool in cargo-audit cargo-deny cargo-outdated checksum; do
            artifact_dir="${artifacts_root}/dep-audit-${tool}-${{ github.run_id }}"
            report="${artifact_dir}/report-${tool}.md"
            status_file="${artifact_dir}/status-${tool}.txt"

            if [ ! -f "${report}" ]; then
              # Auto-expand the placeholder so a missing artifact is loud.
              {
                printf '<details open>\n'
                printf '<summary><strong>%s</strong></summary>\n\n' "${tool}"
                printf '(report missing — job crashed before writing output)\n\n'
                printf '</details>\n\n'
              } >> "${sections}"
              overall_exit=1
              continue
            fi

            cat "${report}" >> "${sections}"
            printf '\n' >> "${sections}"

            if [ -f "${status_file}" ]; then
              tool_exit="$(cat "${status_file}")"
            else
              tool_exit=1
            fi
            if [ "${tool_exit}" != "0" ]; then
              overall_exit=1
            fi
          done

          # Write the combined report with STATUS at the TOP so the
          # high-level verdict is visible without scrolling or
          # expanding any <details> block.
          {
            printf '## Dep audit\n\n'
            printf 'Run against `%s` on `%s`.\n\n' \
              "$(git rev-parse --short HEAD)" \
              "$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo unknown)"
            if [ "${overall_exit}" = "0" ]; then
              printf 'STATUS: PASS\n\n'
            else
              printf 'STATUS: FAIL\n\n'
            fi
            cat "${sections}"
          } > "${combined}"

          echo '--- combined report ---'
          cat "${combined}"
          echo "overall_exit=${overall_exit}" >> "$GITHUB_OUTPUT"

      - name: Find existing comment
        id: find-comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '<!-- cryptid-dep-audit -->';
            const existing = comments.find(c => c.body && c.body.includes(marker));
            return existing ? String(existing.id) : '';

      - name: Post or update PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = '<!-- cryptid-dep-audit -->\n[cryptid] dep-audit run ' +
              context.runId + '\n\n' + fs.readFileSync('combined-report.md', 'utf8');
            const existingId = '${{ steps.find-comment.outputs.result }}';
            if (existingId) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: parseInt(existingId, 10),
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload combined report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dep-audit-combined-${{ github.run_id }}
          path: combined-report.md
          retention-days: 90

      - name: Fail combine job on any tool failure
        run: |
          overall_exit='${{ steps.combine.outputs.overall_exit }}'
          if [ "${overall_exit}" != "0" ]; then
            echo 'dep audit reported FAIL (at least one matrix job or checksum tripwire blocked)'
            exit 1
          fi
          echo 'dep audit reported PASS'
